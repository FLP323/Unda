<!DOCTYPE html>
<html>

<head>
	<title>Modifica Album - Unda</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
	<div th:replace="~{fragments/header :: header}"></div>

	<main>
		<h1>Modifica Album</h1>
		<form th:action="@{/admin/albums/{id}(id=${album.id})}" method="post">
			<div>
				<label for="titolo">Titolo</label>
				<input type="text" id="titolo" name="titolo" th:value="${album.titolo}" required>
			</div>
			<div>
				<label for="releaseDate">Data di uscita</label>
				<input type="date" id="releaseDate" name="releaseDate" th:value="${album.releaseDate}" required>
			</div>
			<div>
				<label for="coverImageUrl">URL Copertina</label>
				<input type="url" id="coverImageUrl" name="coverImageUrl" th:value="${album.coverImageUrl}">
			</div>
			<div>
				<label>Artisti</label>
				<div class="checkbox-group">
					<div class="checkbox-item" th:each="artista : ${allArtists}">
						<input type="checkbox" name="artisti" th:value="${artista.id}"
							th:id="'artista_' + ${artista.id}">
						<label th:for="'artista_' + ${artista.id}" th:text="${artista.name}">Artista</label>
					</div>
				</div>
			</div>
			<div>
				<label>Generi</label>
				<div class="checkbox-group">
					<div class="checkbox-item" th:each="genere : ${allGenres}">
						<input type="checkbox" name="generi" th:value="${genere}" th:id="${genere}">
						<label th:for="${genere}" th:text="${genere}">Genere</label>
					</div>
				</div>
			</div>
			<button type="submit">Modifica canzoni</button>
			<a th:href="@{/albums/{id}(id=${album.id})}"><button type="button">Annulla</button></a>
		</form>
	</main>

	<div th:replace="~{fragments/footer :: footer}"></div>
</body>

</html>
