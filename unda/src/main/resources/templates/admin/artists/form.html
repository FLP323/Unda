<!DOCTYPE html>
<html>

<head>
	<title>Nuovo Artista - Unda</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
	<div th:replace="~{fragments/header :: header}"></div>

	<main>
		<h1>Nuovo Artista</h1>
		<form th:action="@{/admin/artists}" method="post">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
			<div>
				<label for="name">Nome</label>
				<input type="text" id="name" name="name" required>
			</div>
			<div>
				<label for="bio">Biografia</label>
				<textarea id="bio" name="bio"></textarea>
			</div>
			<div>
				<label for="imageUrl">URL Immagine</label>
				<input type="url" id="imageUrl" name="imageUrl">
			</div>
			<div>
				<label>Generi</label>
				<div class="checkbox-group">
					<div class="checkbox-item" th:each="genere : ${allGenres}">
						<input type="checkbox" name="generi" th:value="${genere}" th:id="${genere}">
						<label th:for="${genere}" th:text="${genere}">Genere</label>
					</div>
				</div>
			</div>
			<button type="submit">Crea Artista</button>
			<a th:href="@{/artists}"><button type="button">Annulla</button></a>
		</form>
	</main>

	<div th:replace="~{fragments/footer :: footer}"></div>
</body>

</html>
